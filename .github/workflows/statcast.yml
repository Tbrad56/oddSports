name: Refresh Statcast data

on:
  schedule:
    # Daily at 11:00 UTC (~7am ET) — after the previous night's games are in
    - cron: "0 11 * * *"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch Statcast leaderboard
        run: |
          mkdir -p data
          python scripts/fetch_statcast.py

      - name: Commit if changed
        run: |
          git config user.name "statcast-bot"
          git config user.email "actions@github.com"
          git add data/statcast.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update Statcast data ($(date -u +%F))"
          git push
